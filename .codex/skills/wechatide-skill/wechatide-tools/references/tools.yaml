    {
      "id": "get_simulator_console",
      "name": "读取 console",
      "summary": "对小程序 console 缓冲区执行 grep 过滤并返回命中行。command 是 grep 命令字符串（不含文件名），如 'grep -i error'。要获取全部日志请用 'grep -n .'（匹配任意行）。返回空字符串代表没有匹配行，不代表 console 为空。",
      "group": "runtime",
      "source": {
        "type": "wechatide"
      },
      "scenes": [
        "debugger"
      ],
      "inputSchema": {
        "project": {
          "type": "string",
          "required": true,
          "description": "项目绝对路径"
        },
        "command": {
          "type": "string",
          "required": true,
          "description": "grep 命令字符串（不含文件名），例如: 'grep -n .'（全部）、'grep -i error'（过滤 error）、'grep -n warn'（过滤 warn）。不要传 'all' 等枚举值。"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "get_simulator_console"
      }
    },
