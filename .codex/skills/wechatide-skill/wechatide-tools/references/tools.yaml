{
  "defaults": {
    "timeoutMs": 20000
  },
  "tools": [
    {
      "id": "check_wechatide_status",
      "name": "读取微信开发者工具状态",
      "summary": "读取微信开发者工具登录态（loginExpired）、当前登录用户（loginUser）和 skill 版本号；始终返回 versionRelation；未传 agent skill 版本时为 skip_check；落后则按 skillPath 同步内置 skill，超前则提示更新开发者工具或同步；连接失败时会用当前 clientName 自动 auth 一次并重试。",
      "group": "ide",
      "source": {
        "type": "wechatide"
      },
      "scenes": [
        "initializer"
      ],
      "inputSchema": {
        "version": {
          "type": "string",
          "required": false,
          "description": "当前调用侧 agent 加载的 wechatide-skill/skill.yaml 文件中的 version 字段值。skill 约定会话首次检查必须传；不传则 versionRelation 为 skip_check 并返回 warning，且不得当作就绪。传入时返回 versionRelation（equal | agent_behind | agent_ahead），不一致时附带 warning 与 skillPath。"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "check_wechatide_status"
      }
    },
    {
      "id": "close_project_window",
      "name": "关闭项目窗口",
      "summary": "关闭包含模拟器的项目窗口，不等于完全退出微信开发者工具",
      "group": "ide",
      "source": {
        "type": "wechatide"
      },
      "scenes": [
        "initializer"
      ],
      "inputSchema": {
        "project": {
          "type": "string",
          "required": true,
          "description": "项目本地绝对路径；根目录必须包含 project.config.json"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "close_project_window"
      }
    },
    {
